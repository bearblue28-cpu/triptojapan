{% extends "admin/layout.html" %}

{% block content %}
<h1>관리자 대시보드</h1>
<p>여기서 여행지 데이터를 관리합니다.</p>

<!-- 상단 관리 버튼 -->
<div style="display:flex; gap:12px; margin-bottom:24px;">
    <a href="{{ url_for('admin.city_new') }}"
       class="top-btn">
        + 도시 추가
    </a>

    <a href="{{ url_for('admin.tags') }}"
       class="top-btn"
       style="background:#333;">
        🏷 태그 관리
    </a>
</div>

<!-- 도시 목록 -->
<ul style="list-style:none; padding:0;">
{% for city in destinations %}
    <li style="margin-bottom:12px; padding:12px 16px;
               background:#fff; border-radius:10px;
               box-shadow:0 4px 8px rgba(0,0,0,0.05);
               display:flex; justify-content:space-between; align-items:center;">

        <strong>{{ city.city }}</strong>

        <div style="display:flex; gap:12px;">
            <a href="{{ url_for('admin.city_edit', city_name=city.city) }}">수정</a>
            <a href="{{ url_for('admin.districts', city_name=city.city) }}">구 관리</a>
        </div>
    </li>
{% endfor %}
</ul>

{% if not destinations %}
    <p style="color:#888;">등록된 도시가 없습니다.</p>
{% endif %}

{% endblock %}
