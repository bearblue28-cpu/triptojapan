{% extends "admin/layout.html" %}

{% block content %}
<h2 style="margin-bottom:20px;">도시 목록</h2>

<a href="{{ url_for('admin.city_new') }}"
   style="display:inline-block; margin-bottom:24px;
          padding:10px 14px; background:#4f7cff;
          color:#fff; border-radius:8px;
          text-decoration:none; font-weight:600;">
    + 도시 추가
</a>

<ul style="list-style:none; padding:0;">
{% for city in cities %}
    <li style="margin-bottom:14px; padding:12px 16px;
               background:#fff; border-radius:10px;
               box-shadow:0 4px 8px rgba(0,0,0,0.05);
               display:flex; justify-content:space-between; align-items:center;">

        <strong style="font-size:16px;">
            {{ city.city }}
        </strong>

        <div style="display:flex; gap:12px;">
            <a href="{{ url_for('admin.city_edit', city_name=city.city) }}"
               style="text-decoration:none; color:#4f7cff; font-weight:600;">
                수정
            </a>

            <a href="{{ url_for('admin.districts', city_name=city.city) }}"
               style="text-decoration:none; color:#333; font-weight:600;">
                구 관리
            </a>
        </div>
    </li>
{% endfor %}
</ul>

{% if not cities %}
    <p style="color:#888;">등록된 도시가 없습니다.</p>
{% endif %}
{% endblock %}
