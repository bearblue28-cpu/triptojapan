<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}관리자 페이지{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            background: #f5f6f8;
            margin: 0;
            padding: 20px;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .top-btn, .back-btn {
            padding: 10px 16px;
            background: #4f7cff;
            color: #fff;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: 0.2s;
        }

        .top-btn:hover, .back-btn:hover {
            background: #3563d6;
        }
    </style>
</head>
<body>

<!-- 공통 버튼 -->
<div class="btn-group">
    <a href="{{ url_for('admin.dashboard') }}" class="top-btn">홈으로 가기</a>
    {% if request.referrer %}
        <a href="{{ request.referrer }}" class="back-btn">이전으로</a>
    {% endif %}
</div>

<!-- 페이지 콘텐츠 -->
{% block content %}{% endblock %}

</body>
</html>
