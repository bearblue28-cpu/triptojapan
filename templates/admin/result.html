<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>당신의 여행 성향</title>
  <style>
    body { font-family: sans-serif; padding: 40px; background: #f5f6f8; }
    .card { background: #fff; padding: 32px; border-radius: 16px; max-width: 480px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.08); text-align: center; }
    h2 { margin-bottom: 24px; }
    h3 { font-size: 28px; color: #4f7cff; }
  </style>
</head>
<body>

<div class="card">
  <h2>당신의 여행 성향은</h2>
  <h3>{{ display_text(travel_type) }}</h3>

  <!-- 다시하기 버튼 -->
  <a href="{{ url_for('reset') }}">
    <button style="
        margin-top: 24px;
        padding: 12px 20px;
        font-size: 16px;
        border-radius: 10px;
        border: none;
        background-color: #4f7cff;
        color: white;
        cursor: pointer;
    ">
      홈으로 가기
    </button>
  </a>
  
  <a href="{{ url_for('recommend') }}">
    <button style="
        margin-top: 12px; /* 다시하기 버튼과 간격 */
        padding: 12px 20px;
        font-size: 16px;
        border-radius: 10px;
        border: none;
        background-color: #4fcf7c;
        color: white;
        cursor: pointer;
    ">
      여행지 추천받기
    </button>
  </a>

</div>

</body>
</html>
