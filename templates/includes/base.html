<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>{% block title %}여행 추천{% endblock %}</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600&display=swap" rel="stylesheet">
<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Pretendard', sans-serif;
    background: #f5f6f8;
}

/* 상단 바 */
.top-bar {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    padding: 8px 16px;
    background: #fff;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    position: fixed;
    width: 100%;
    top: 0;
    z-index: 100;
}

.top-bar a {
    text-decoration: none;
    color: #4f7cff;
    font-weight: 600;
    padding: 8px 16px;
    border-radius: 12px;
    background: #eef2ff;
    transition: 0.2s;
}

.top-bar a:hover {
    background: #d6e0ff;
}

/* 모바일에서만 하단 PC버전 버튼 */
.pc-btn {
    display: none;
}

@media screen and (max-width: 768px) {
    .pc-btn {
        display: block;
        position: fixed;
        bottom: 20px;
        right: 20px;
        padding: 8px 12px;
        font-size: 12px;
        border-radius: 8px;
        background: #4f7cff;
        color: #fff;
        text-decoration: none;
        z-index: 1000;
    }
}

/* 공용 중앙 검색창 스타일 */
.search-container {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 99;
}

.search-box {
    display: flex;
    gap: 8px;
}

.search-box input {
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 16px;
}

.search-box button {
    padding: 8px 12px;
    border: none;
    border-radius: 8px;
    background: #4f7cff;
    color: #fff;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
}

.search-box button:hover {
    background: #3563d6;
}
</style>
</head>
<body>

<!-- 상단 바 -->
<div class="top-bar">
    <a href="{{ url_for('survey') }}">설문으로 여행지 추천받기</a>
</div>

<!-- 중앙 검색창 -->
<div class="search-container">
    <form class="search-box" method="get" action="{{ url_for('search') }}">
        <input type="text" name="q" placeholder="도시를 검색하세요..." value="{{ request.args.get('q','') }}" required>
        <button type="submit">검색</button>
    </form>
</div>

<!-- 모바일일 때 하단 PC버전 버튼 -->
{% if session.get('mode') == 'mobile' %}
<a href="{{ url_for('set_mode', mode='pc') }}" class="pc-btn">PC버전으로 보기</a>
{% endif %}

<!-- 페이지별 본문 -->
<div style="margin-top: 100px;">
{% block content %}
{% endblock %}
</div>

</body>
</html>
