{% extends "layout.html" %}

{% block title %}홈 | 여행 추천{% endblock %}

{% block content %}

<!-- 상단 바 -->
<div class="top-bar">
    <a href="{{ url_for('survey') }}">설문으로 여행지 추천받기</a>
</div>

<div class="page">
    <!-- 중앙 검색 영역 -->
    <div class="center-container">
        <form class="search-box" action="{{ url_for('search') }}" method="get">
            <a href="{{ url_for('home') }}" class="btn">홈</a>

            <input
                type="text"
                name="q"
                placeholder="도시를 검색하세요..."
                required
            >

            <button type="submit" class="btn">검색</button>
        </form>
    </div>
</div>

{% endblock %}
