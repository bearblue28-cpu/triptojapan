<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>홈 | 여행 추천</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600&display=swap" rel="stylesheet">
<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Pretendard', sans-serif;
    background: #f5f6f8;
}

/* 상단 바 */
.top-bar {
    display: flex;
    justify-content: flex-end; /* 오른쪽에 설문 버튼 */
    align-items: center;
    padding: 2px -px;
    background: #fff;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    position: fixed;
    width: 100%;
    top: 0;
    z-index: 100;
}

.top-bar a {
    text-decoration: none;
    color: #4f7cff;
    font-weight: 600;
    padding: 8px 16px;
    border-radius: 12px;
    background: #eef2ff;
    transition: 0.2s;
}

.top-bar a:hover {
    background: #d6e0ff;
}

/* 중앙 검색창 */
.search-container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.search-box {
    display: flex;
    align-items: center;
    gap: 10px;
}

.search-box a.home-btn {
    text-decoration: none;
    padding: 12px 16px;
    border-radius: 12px;
    background: #4f7cff;
    color: #fff;
    font-weight: 600;
    transition: 0.2s;
}

.search-box a.home-btn:hover {
    background: #3563d6;
}

.search-box input[type="text"] {
    width: 400px;
    max-width: 80vw;
    padding: 12px 16px;
    border-radius: 12px;
    border: 1px solid #ccc;
    font-size: 16px;
}

.search-box button {
    padding: 12px 20px;
    border: none;
    border-radius: 12px;
    background: #4f7cff;
    color: #fff;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
}

.search-box button:hover {
    background: #3563d6;
}
</style>
</head>
<body>

<!-- 상단 바 (오른쪽 상단 설문 버튼) -->
<div class="top-bar">
    <a href="{{ url_for('survey') }}">설문으로 여행지 추천받기</a>
</div>

<!-- 중앙 검색창 -->
<div class="search-container">
    <form class="search-box" action="{{ url_for('search') }}" method="get">
        <!-- 홈 버튼: '/' 대신 home 라우트로 연결 -->
        <a href="{{ url_for('home') }}" class="home-btn">홈</a>

        <input type="text" name="q" placeholder="도시를 검색하세요..." required>
        <button type="submit">검색</button>
    </form>
</div>


</body>
</html>
