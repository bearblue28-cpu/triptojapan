<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>추천 일본 여행지</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600&display=swap" rel="stylesheet">
<style>
body {
    margin: 0;
    font-family:'Pretendard',sans-serif;
    background:#f5f6f8;
    padding:24px;
}

/* 카드 */
.card {
    background:#fff;
    padding:24px;
    border-radius:16px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
    margin-bottom:16px;
}

/* 텍스트 스타일 */
.city { font-size:18px; font-weight:600; margin-bottom:4px; }
.desc { font-size:14px; color:#666; margin-bottom:8px; }
.percent { font-size:13px; color:#4f7cff; font-weight:600; margin-bottom:6px; }
.highlights { font-size:13px; color:#333; margin-bottom:4px; }
.header { margin-bottom:24px; }

/* 버튼 */
.back-btn {
    display:inline-block; 
    margin-top:16px; 
    padding:10px 18px; 
    border:none; 
    border-radius:10px; 
    background:#4f7cff; 
    color:white; 
    cursor:pointer; 
    text-decoration:none;
}

/* 상단 홈 버튼 */
.top-home {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 1000;
    display: inline-block;
    padding: 24px 32px;
    background:#4f7cff;
    color:#fff;
    border-radius:16px;
    font-weight:700;
    font-size:20px;
    text-decoration:none;
    box-shadow:0 6px 12px rgba(0,0,0,0.2);
}

/* 모바일 하단 PC버튼 */
.pc-btn {
    display: none;
    position: fixed;
    bottom: 12px;
    right: 12px;
    padding: 6px 12px;
    font-size: 12px;
    background: #4f7cff;
    color: #fff;
    border-radius: 8px;
    text-decoration: none;
    z-index: 101;
}

/* 반응형 */
@media screen and (max-width: 768px) {
    .card { width: 90%; padding: 16px; }
    .back-btn { padding: 8px 14px; font-size:14px; }
    .top-home { padding: 12px 18px; font-size:16px; }
    .pc-btn { display: block; }
}
</style>
</head>
<body>

<!-- 상단 홈 버튼 -->
<a href="{{ url_for('home') }}" class="top-home">홈으로 가기</a>

<div class="header">
    <h2>추천 여행지</h2>
    <a href="{{ url_for('reset') }}" class="back-btn">다시 설문하기</a>
</div>

{% for dest in results %}
<div class="card">
    <a href="{{ url_for('city_detail', city_name=dest.city) }}" style="text-decoration:none; color:inherit;">
        <div class="city">{{ dest.city }}</div>
        <div class="desc">{{ dest.description }}</div>
        <div class="highlights">추천 장소: {% for h in dest.highlights %}{{ display_text(h) }}{% if not loop.last %}, {% endif %}{% endfor %}</div>
        <div class="percent">유형 일치: {{ dest.percent }}%</div>
    </a>
</div>
{% endfor %}


</body>
</html>
