<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Travel Style Test</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600&display=swap" rel="stylesheet">
<style>
body {
    margin: 0;
    font-family: 'Pretendard', sans-serif;
    background: #f5f6f8;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* 설문 카드 */
.card {
    background: #ffffff;
    width: 420px;
    padding: 32px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

/* 질문 */
.question {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 24px;
    line-height: 1.4;
}

/* 선택지 버튼 */
.options {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.option-btn {
    padding: 14px 16px;
    border-radius: 12px;
    border: 1px solid #e0e0e0;
    background: #fff;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.2s ease;
    text-align: left;
}

.option-btn:hover {
    background: #f0f4ff;
    border-color: #4f7cff;
    color: #4f7cff;
}

/* 이전 버튼 */
.back-btn {
    padding: 10px 16px;
    border-radius: 12px;
    border: 1px solid #ccc;
    background: #f0f0f0;
    cursor: pointer;
}

/* 진행도 표시 */
.progress {
    margin-top: 24px;
    font-size: 13px;
    color: #999;
    text-align: right;
}

/* 상단 홈 버튼 */
.top-home {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 1000;
    display: inline-block;
    padding: 24px 32px;
    background:#4f7cff;
    color:#fff;
    border-radius:16px;
    font-weight:700;
    font-size:20px;
    text-decoration:none;
    box-shadow:0 6px 12px rgba(0,0,0,0.2);
}

/* 모바일 하단 PC버튼 */
.pc-btn {
    display: none;
    position: fixed;
    bottom: 12px;
    right: 12px;
    padding: 6px 12px;
    font-size: 12px;
    background: #4f7cff;
    color: #fff;
    border-radius: 8px;
    text-decoration: none;
    z-index: 101;
}

/* 반응형: 모바일 화면용 */
@media screen and (max-width: 768px) {
    .card {
        width: 90%;
        padding: 24px;
    }

    .option-btn {
        font-size: 14px;
        padding: 12px 14px;
    }

    .top-home {
        padding: 12px 18px;
        font-size: 16px;
    }

    /* 모바일에서만 하단 PC 버튼 표시 */
    .pc-btn {
        display: block;
    }
}
</style>
</head>
<body class="{% if session.get('mode') == 'pc' %}pc-mode{% else %}mobile-mode{% endif %}">

<!-- 상단 홈 버튼 -->
<a href="{{ url_for('home') }}" class="top-home">홈으로 가기</a>

<!-- 설문 카드 -->
<div class="card">
    <form method="post">
        <div class="question">
            {{ display_text(question.question) }}
        </div>

        <div class="options">
            {% for key, option in question.options.items() %}
                <button class="option-btn" type="submit" name="choice" value="{{ key }}">
                    {{ display_text(option[0]) }}
                </button>
            {% endfor %}
        </div>
    </form>

    {% if step > 1 %}
    <form method="post" style="margin-top:16px; text-align:center;">
        <button type="submit" name="back" value="1" class="back-btn">⬅ 이전</button>
    </form>
    {% endif %}

    <div class="progress">
        {{ step }} / {{ total }}
    </div>
</div>

</body>
</html>
