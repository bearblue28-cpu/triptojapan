<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>당신의 여행 성향</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600&display=swap" rel="stylesheet">
<style>
body {
    margin: 0;
    font-family: 'Pretendard', sans-serif;
    background: #f5f6f8;
    padding: 20px;
    display: flex;
    justify-content: center; /* 수평 중앙 */
    align-items: center;     /* 수직 중앙 */
    min-height: 100vh;
}

/* 카드 */
.card {
    background: #fff;
    padding: 32px;
    border-radius: 16px;
    max-width: 480px;
    width: 90%;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    text-align: center; /* 내부 텍스트 중앙 정렬 */
}

/* 버튼 */
.btn {
    margin-top: 16px;
    padding: 12px 20px;
    font-size: 16px;
    border-radius: 10px;
    border: none;
    color: #fff;
    cursor: pointer;
}

.reset-btn { background: #4f7cff; }
.reset-btn:hover { background: #3563d6; }

.recommend-btn { background: #4fcf7c; }
.recommend-btn:hover { background: #38a567; }

/* 상단 홈 버튼 */
.top-home {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 1000;
    display: inline-block;
    padding: 24px 32px;
    background:#4f7cff;
    color:#fff;
    border-radius:16px;
    font-weight:700;
    font-size:20px;
    text-decoration:none;
    box-shadow:0 6px 12px rgba(0,0,0,0.2);
}

/* 모바일 하단 PC버튼 */
.pc-btn {
    display: none;
    position: fixed;
    bottom: 12px;
    right: 12px;
    padding: 6px 12px;
    font-size: 12px;
    background: #4f7cff;
    color: #fff;
    border-radius: 8px;
    text-decoration: none;
    z-index: 101;
}

/* 반응형: 모바일 화면용 */
@media screen and (max-width: 768px) {
    .card { padding: 24px; }
    .btn { font-size: 14px; padding: 10px 16px; }
    .top-home { padding: 12px 18px; font-size: 16px; }
    .pc-btn { display: block; }
}
</style>
</head>
<body class="{% if session.get('mode') == 'pc' %}pc-mode{% else %}mobile-mode{% endif %}">

<!-- 상단 홈 버튼 -->
<a href="{{ url_for('home') }}" class="top-home">홈으로 가기</a>

<!-- 성향 카드 -->
<div class="card">
    <h2>당신의 여행 성향은</h2>
    <h3>{{ display_text(travel_type) }}</h3>

    <a href="{{ url_for('reset') }}">
        <button class="btn reset-btn">다시 설문하기</button>
    </a>

    <a href="{{ url_for('recommend') }}">
        <button class="btn recommend-btn">여행지 추천받기</button>
    </a>
</div>
</body>
</html>
