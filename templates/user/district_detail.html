<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>{{ district_name }} 상세</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600&display=swap" rel="stylesheet">
<style>
body {
    font-family:'Pretendard', sans-serif;
    background:#f5f6f8;
    margin:0;
    padding:0;
    text-align:center;
}

/* 🔥 배경 hero 영역 */
.district-hero {
    height:320px;
    border-radius:0 0 20px 20px;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    margin-bottom:40px;
}

.district-hero::after {
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.45);
}

.district-hero h1 {
    position:relative;
    z-index:2;
    font-size:32px;
}

.container {
    max-width:700px;
    margin:0 auto 50px;
}

.btn-group {
    display:flex;
    justify-content:center;
    gap:12px;
    margin-bottom:30px;
}

.top-btn {
    padding:12px 18px;
    background:#4f7cff;
    color:#fff;
    border-radius:12px;
    font-weight:600;
    text-decoration:none;
    box-shadow:0 4px 8px rgba(0,0,0,0.15);
    transition:0.2s;
}

.top-btn:hover {
    background:#3563d6;
}

.card {
    background:#fff;
    padding:16px;
    border-radius:12px;
    box-shadow:0 4px 8px rgba(0,0,0,0.05);
    text-align:left;
    margin-bottom:12px;
}

.card a {
    color:#4f7cff;
    font-weight:600;
    text-decoration:none;
}

.card a:hover {
    text-decoration:underline;
}
</style>
</head>
<body>

<!-- 🔥 district 배경 적용 영역 -->
{% if district.images and district.images.main %}
<div class="district-hero"
     style="background-image:url('{{ url_for('static',
                     filename='uploads/' ~ district.images.main) }}');
            background-size:cover;
            background-position:center;">
{% else %}
<div class="district-hero" style="background:#ccc;">
{% endif %}
    <h1>{{ district_name }}</h1>
</div>

<div class="container">

    <div class="btn-group">
        <a href="{{ url_for('city_detail', city_name=city.city) }}" class="top-btn">도시로 돌아가기</a>
        <a href="{{ url_for('home') }}" class="top-btn">홈으로 가기</a>
    </div>

    <p>{{ district.description }}</p>

    {% if attractions %}
        <h3>관광지</h3>
        {% for name, attr in attractions.items() %}
            <div class="card">
                <a href="{{ url_for('attraction_detail',
                        city_name=city.city,
                        district_name=district_name,
                        attraction_name=name) }}">
                        {{ name }}
                </a>
                <p>{{ attr.description }}</p>
            </div>
        {% endfor %}
    {% endif %}

</div>
</body>
</html>
