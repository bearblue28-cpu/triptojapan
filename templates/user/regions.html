<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>일본 지역 목록</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600&display=swap" rel="stylesheet">
<style>
body { font-family: 'Pretendard', sans-serif; background: #f5f6f8; margin: 0; padding: 0; }
.container { max-width: 800px; margin: 60px auto; padding: 0 20px; text-align: center; }
.region-card { display: block; margin: 20px 0; padding: 18px; background: #fff; border-radius: 14px; text-decoration: none; color: #4f7cff; font-weight: 600; box-shadow: 0 4px 10px rgba(0,0,0,0.08); transition: background 0.2s; }
.region-card:hover { background: #eef2ff; }
</style>
</head>
<body>
<div class="container">
    <h1>일본 지역</h1>
    {% for region in regions %}
        <a href="{{ url_for('region_detail', region_name=region.region) }}" class="region-card">
            {{ region.region }} ({{ region.cities|length }} 도시)
        </a>
    {% endfor %}
</div>
</body>
</html>
